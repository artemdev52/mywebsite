<!DOCTYPE html>
<html>
<head>
<title>My website</title>
<style>
body{
  background-color: #000000;
  color: #0aff0a;
}
.butin {
  padding: 8px;
  border: 2px solid #0aff0a;
  background-color: black;
  color: #0aff0a;
  border-radius: 8px;
}
#div {
  margin: 5px
}
</style>
</head>
<body>
<h1 id=h1>This is my 1st website</h1>
<input class='butin' id='input' placeholder='Type something...'></input>
<div id='div'>
<button class='butin' onclick='replace_h1()'>Replace the heading</button>
<button class='butin' onclick='replace_title()''>Replace the title</button></div>
<p></p>
<button class='butin' id="btn1" onclick="buttonclick()">Clicks: 0</button>
<button class='butin' onclick="reset()">Reset click counter</button>
<p id=txt>Press CTRL+U to see the code!</p>
<input id=num class='butin' type="number" placeholder="Type a number">
<button class='butin' onclick="convert10to2()">Decimal to binary</button>
<p id=p></p>
<input class='butin' id='input_color' placeholder='Type a color...'>
<button class='butin' onclick='change_background()'>Change the background</button>
<script>
let clicks = 0;

function buttonclick() {
  clicks = clicks + 1;
  // update button text
  document.getElementById("btn1").textContent = "Clicks: " + clicks; 
}
  
  //resets clicks
function reset() {
  document.getElementById("btn1").textContent = "Clicks: 0";
  clicks = 0;
}
function convert10to2() {
  let value = Number(document.getElementById("num").value);
  let output = "";
  let i = 0;
  if (value < 0) {
    value = -value;
    output = "-";
  }
  if (value == 0) {
    output = "0";
  }
  while (value >= 2 ** i) {
    i = i + 1;
  }
  i = i - 1;
  while (i >= 0) {
    if (value >= 2**i) {
      value = value - 2**i;
      i -= 1;
      output = output + "1";
    } else if (value < 2**i) {
      i = i - 1;
      output = output + "0";
    }
  }
  document.getElementById("p").textContent = "Your number in binary is " + output; 
}
let question = 'false'
function replace_h1() {
  let new_name = document.getElementById('input').value;
  if (new_name == 'fish') {
    question = 'false';
    alert('https://www.youtube.com/watch?v=haJfJAwpViI');
    document.getElementById('h1').textContent = new_name;
  } else if(new_name == '67') {
    question = 'false';
    alert('89');
  } else if(new_name == 'Type something...') {
    alert('Are you THAT bored?!');
    document.getElementById('h1').textContent = new_name;
    question = 'true';
  } else if(new_name == 'скажи 300') {
    question = 'false';
    alert('Запретили программисты');
  } else if(new_name == 'secret') {
    question = 'false';
    alert('https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1');
    document.getElementById('h1').textContent = new_name;
  } else if (question == 'true' && new_name == 'yes i am') {
    question = 'false';
    alert('OK');
  } else if (new_name == 'alert("Hello, World!")') {
    alert('Hello, World!');
  } else if (new_name == 'driving in my car') {
    alert('https://www.youtube.com/watch?v=u5NqO2v_xnY');
    document.getElementById('h1').textContent = new_name;
  } else {
    document.getElementById('h1').textContent = new_name;
    question = 'false';
  }
}
function replace_title() {
  let new_name = document.getElementById('input').value;
  document.title = new_name;
}
function change_background() {
  let color = document.getElementById('input_color').value;
  document.body.style.background = color;
}
</script>
</body>
</html>
