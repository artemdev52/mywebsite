function convert10to2() {
  let value = Number(document.getElementById("num").value);
  let output = "";
  let i = 0;
  if (value < 0) {
    value = -value;
    output = "-";
  }
  if (value == 0) {
    output = "0";
  }
  while (value >= 2 ** i) {
    i = i + 1;
  }
  i = i - 1;
  while (i >= 0) {
    if (value >= 2**i) {
      value = value - 2**i;
      i -= 1;
      output = output + "1";
    } else if (value < 2**i) {
      i = i - 1;
      output = output + "0";
    }
  }
  document.getElementById("p").textContent = "Your number in binary is " + output; 
}
