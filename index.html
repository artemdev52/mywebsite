 <title>My website</title>

<input id=num type="number" placeholder="Type a number">
<button onclick="convert10to2()">Decimal to binary</button>
<p id=p></p>
<script>
let clicks = 0;

function buttonclick() {
  clicks = clicks + 1;
  // update button text
  document.getElementById("btn1").textContent = "Clicks: " + clicks; 
}
  
  //resets clicks
function reset() {
  document.getElementById("btn1").textContent = "Clicks: 0";
  clicks = 0;
}
function convert10to2() {
  let value = Number(document.getElementById("num").value);
  let output = "";
  let i = 0;
  if (value < 0) {
    value = -value;
    output = "-";
  }
  if (value == 0) {
    output = "0";
  }
  while (value >= 2 ** i) {
    i = i + 1;
  }
  i = i - 1;
  while (i >= 0) {
    if (value >= 2**i) {
      value = value - 2**i;
      i -= 1;
      output = output + "1";
    } else if (value < 2**i) {
      i = i - 1;
      output = output + "0";
    }
  }
  document.getElementById("p").textContent = "Your number in binary is " + output; 
}
let question = 'false'
function replace() {

  } else if(new_name == 'Type something...') {
    alert('Are you THAT bored?!');
    document.getElementById('h1').textContent = new_name;
    question = 'true';
  } else if(new_name == 'скажи 300') {
    question = 'false';
    alert('Запретили программисты');
  } else if(new_name == 'secret') {

    question = 'false';
    alert('OK')
  } else {
    document.getElementById('h1').textContent = new_name;
    question = 'false';
  }
}
</script>
